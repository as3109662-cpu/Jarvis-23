

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Live World News</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
        }
        h1 {
            color: #00ffcc;
        }
        select, button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
        }
        .news-container {
            margin-top: 20px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
        .news-item {
            background: #222;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        a {
            color: #00ffcc;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1>🌍 Live World News (Google से जुड़ा हुआ)</h1>

<select id="country">
    <option value="IN">India</option>
    <option value="US">USA</option>
    <option value="GB">UK</option>
    <option value="PK">Pakistan</option>
    <option value="CN">China</option>
</select>

<button onclick="getNews()">🔄 News Refresh करें</button>

<div class="news-container" id="news"></div>

<script>
function getNews() {
    let country = document.getElementById("country").value;
    
    let rssUrl = `https://news.google.com/rss?hl=en-${country}&gl=${country}&ceid=${country}:en`;
    let apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

    fetch(apiUrl)
    .then(response => response.json())
    .then(data => {
        let newsDiv = document.getElementById("news");
        newsDiv.innerHTML = "";

        data.items.slice(0, 10).forEach(item => {
            newsDiv.innerHTML += `
                <div class="news-item">
                    <h3>${item.title}</h3>
                    <p>${item.pubDate}</p>
                    <a href="${item.link}" target="_blank">पूरा पढ़ें</a>
                </div>
            `;
        });
    })
    .catch(error => {
        document.getElementById("news").innerHTML = "❌ डेटा लोड नहीं हो पाया। इंटरनेट चेक करें।";
    });
}

// Page Load पर अपने आप News आए
getNews();

// हर 5 मिनट में ऑटो अपडेट
setInterval(getNews, 300000);
</script>

</body>
</html>
